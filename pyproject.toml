[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "chat4000-hermes-plugin"
version = "1.0.0"
description = "chat4000 platform adapter for Hermes Agent — encrypted relay link to iOS/macOS/CLI apps"
readme = "README.md"
license = { text = "GPL-3.0-or-later" }
requires-python = ">=3.11"
authors = [{ name = "NeonNode Ltd", email = "contact@chat4000.com" }]

dependencies = [
  "websockets>=12.0",
  "pynacl>=1.5.0",
  "cryptography>=42.0",
  "sentry-sdk>=2.0",
  "qrcode>=7.4",
]

[project.optional-dependencies]
test = ["pytest>=8.0", "pytest-asyncio>=0.23", "pytest-cov>=5.0"]

[tool.setuptools.packages.find]
include = ["src*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
